<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG-SST PHVA — Sistema Integrado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0F1E;--bg2:#111827;--bg3:#1C2333;--bg4:#243044;
  --border:#2A3450;--border2:#354060;
  --text:#E8EDF5;--text2:#8A9BB8;--text3:#5A6B88;
  --blue:#3B82F6;--blue2:#1D4ED8;--bluel:#EFF6FF;
  --green:#10B981;--greenl:#D1FAE5;
  --amber:#F59E0B;--amberl:#FEF3C7;
  --red:#EF4444;--redl:#FEE2E2;
  --purple:#8B5CF6;--purplel:#EDE9FE;
  --teal:#14B8A6;--teall:#CCFBF1;
  --radius:8px;--radius2:12px;--radius3:16px;
  --font:'IBM Plex Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* LAYOUT */
.app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:56px 1fr;height:100vh}
.topbar{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:10}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:12px 0}
.main{overflow-y:auto;padding:24px;background:var(--bg)}

/* TOPBAR */
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600;color:var(--text);text-decoration:none}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.badge-empresa{background:var(--bg3);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:12px;color:var(--text2)}
.btn-tour{background:linear-gradient(135deg,var(--purple),var(--blue));border:none;color:white;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);display:flex;align-items:center;gap:6px;animation:pulse-tour 2s infinite}
@keyframes pulse-tour{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,0.4)}50%{box-shadow:0 0 0 8px rgba(139,92,246,0)}}

/* SIDEBAR */
.nav-section{padding:4px 12px 8px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);font-weight:600;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:all .15s;font-size:13.5px;color:var(--text2);border-radius:6px;margin:1px 8px;position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(59,130,246,.15);color:var(--blue);font-weight:500}
.nav-item .icon{font-size:17px;width:20px;text-align:center}
.nav-item .badge-count{margin-left:auto;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:1px 7px;font-size:11px;color:var(--text3)}
.nav-sep{border:none;border-top:1px solid var(--border);margin:8px 16px}

/* SIDEBAR BUTTONS */
.sidebar-btns{padding:12px;display:flex;flex-direction:column;gap:8px;margin-top:auto}
.btn-prueba{background:linear-gradient(135deg,rgba(139,92,246,.2),rgba(59,130,246,.2));border:1px solid rgba(139,92,246,.4);color:var(--purple);padding:10px 14px;border-radius:var(--radius2);cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);width:100%;text-align:left;display:flex;align-items:center;gap:8px;transition:all .2s}
.btn-prueba:hover{background:linear-gradient(135deg,rgba(139,92,246,.3),rgba(59,130,246,.3));border-color:var(--purple)}
.btn-limpiar{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--red);padding:8px 14px;border-radius:var(--radius2);cursor:pointer;font-size:12px;font-weight:500;font-family:var(--font);width:100%;text-align:left;display:flex;align-items:center;gap:8px;transition:all .2s}
.btn-limpiar:hover{background:rgba(239,68,68,.15)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px}

/* PAGE HEADER */
.page-header{margin-bottom:24px}
.page-title{font-size:22px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:10px}
.page-sub{font-size:14px;color:var(--text2);margin-top:4px}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.metric.blue::before{background:var(--blue)}
.metric.green::before{background:var(--green)}
.metric.amber::before{background:var(--amber)}
.metric.purple::before{background:var(--purple)}
.metric-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);font-weight:600;margin-bottom:8px}
.metric-val{font-size:28px;font-weight:600;color:var(--text);line-height:1}
.metric-sub{font-size:12px;color:var(--text2);margin-top:6px}
.metric-icon{position:absolute;right:14px;top:14px;font-size:22px;opacity:.4}

/* TABLES */
.table-wrap{overflow-x:auto;margin-top:16px}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;padding:9px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border);background:var(--bg3)}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02);color:var(--text)}
td:first-child{color:var(--text);font-weight:500}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;gap:4px}
.badge.green{background:rgba(16,185,129,.15);color:#34D399;border:1px solid rgba(16,185,129,.2)}
.badge.amber{background:rgba(245,158,11,.15);color:#FCD34D;border:1px solid rgba(245,158,11,.2)}
.badge.red{background:rgba(239,68,68,.15);color:#F87171;border:1px solid rgba(239,68,68,.2)}
.badge.blue{background:rgba(59,130,246,.15);color:#93C5FD;border:1px solid rgba(59,130,246,.2)}
.badge.purple{background:rgba(139,92,246,.15);color:#C4B5FD;border:1px solid rgba(139,92,246,.2)}
.badge.gray{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border)}

/* FORMS */
.form-grid{display:grid;gap:16px}
.form-grid.cols2{grid-template-columns:1fr 1fr}
.form-grid.cols3{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:6px}
label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
input[type=text],input[type=number],input[type=date],input[type=email],select,textarea{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
  padding:9px 12px;font-size:13.5px;color:var(--text);font-family:var(--font);
  transition:border-color .15s;width:100%
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--bg3);color:var(--text)}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:var(--blue);color:white}.btn-primary:hover{background:var(--blue2)}
.btn-success{background:var(--green);color:white}.btn-success:hover{filter:brightness(.9)}
.btn-danger{background:var(--red);color:white}.btn-danger:hover{filter:brightness(.9)}
.btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{color:var(--text);border-color:var(--border2)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}

/* RISK LEVELS */
.risk-I{background:rgba(239,68,68,.15);color:#F87171;border:1px solid rgba(239,68,68,.25);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.risk-II{background:rgba(245,158,11,.15);color:#FCD34D;border:1px solid rgba(245,158,11,.25);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.risk-III{background:rgba(59,130,246,.15);color:#93C5FD;border:1px solid rgba(59,130,246,.25);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.risk-IV{background:rgba(16,185,129,.15);color:#34D399;border:1px solid rgba(16,185,129,.25);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}

/* PROGRESS */
.progress-bar{background:var(--bg3);border-radius:10px;height:6px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:10px;transition:width .5s ease}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--radius2);padding:4px;margin-bottom:20px}
.tab{padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;border:none;background:none;font-family:var(--font)}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* ALERTS */
.alert{padding:12px 16px;border-radius:var(--radius);font-size:13.5px;display:flex;align-items:flex-start;gap:10px;margin-bottom:16px}
.alert.info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:#93C5FD}
.alert.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#34D399}
.alert.warning{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#FCD34D}

/* PHVA CICLO */
.phva-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.phva-card{border-radius:var(--radius2);padding:18px;position:relative;overflow:hidden}
.phva-card.P{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25)}
.phva-card.H{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25)}
.phva-card.V{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25)}
.phva-card.A{background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.25)}
.phva-letter{font-size:40px;font-weight:700;position:absolute;right:16px;top:10px;opacity:.15}
.phva-card.P .phva-letter{color:var(--blue)}
.phva-card.H .phva-letter{color:var(--green)}
.phva-card.V .phva-letter{color:var(--amber)}
.phva-card.A .phva-letter{color:var(--purple)}
.phva-title{font-size:14px;font-weight:600;margin-bottom:4px}
.phva-card.P .phva-title{color:#93C5FD}
.phva-card.H .phva-title{color:#34D399}
.phva-card.V .phva-title{color:#FCD34D}
.phva-card.A .phva-title{color:#C4B5FD}
.phva-items{list-style:none;margin-top:10px;display:flex;flex-direction:column;gap:5px}
.phva-items li{font-size:12.5px;color:var(--text2);display:flex;align-items:center;gap:6px}
.phva-items li::before{content:'▸';font-size:10px;opacity:.5}

/* TOUR OVERLAY */
.tour-overlay{position:fixed;inset:0;z-index:1000;pointer-events:none}
.tour-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999}
.tour-popup{position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);padding:20px;max-width:360px;z-index:1001;box-shadow:0 20px 60px rgba(0,0,0,.6);pointer-events:all;animation:fadeInUp .3s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tour-step-num{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.tour-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px}
.tour-desc{font-size:13.5px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.tour-actions{display:flex;align-items:center;justify-content:space-between}
.tour-dots{display:flex;gap:5px}
.tour-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:all .2s}
.tour-dot.active{background:var(--blue);width:18px;border-radius:3px}
.tour-highlight{position:fixed;border-radius:var(--radius2);border:2px solid var(--blue);box-shadow:0 0 0 4px rgba(59,130,246,.2);z-index:1000;pointer-events:none;transition:all .4s ease;animation:highlight-pulse 2s infinite}
@keyframes highlight-pulse{0%,100%{box-shadow:0 0 0 4px rgba(59,130,246,.2)}50%{box-shadow:0 0 0 8px rgba(59,130,246,.1)}}

/* TYPING EFFECT */
.typing-anim{border-right:2px solid var(--blue);padding-right:2px;animation:blink .7s step-end infinite}
@keyframes blink{0%,100%{border-color:var(--blue)}50%{border-color:transparent}}

/* NOTIF */
.notif{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--green);border-radius:var(--radius2);padding:14px 18px;font-size:13.5px;color:#34D399;z-index:2000;display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* GAUGE RING */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
svg.gauge{overflow:visible}

/* RESPONSIVE */
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .metrics{grid-template-columns:repeat(2,1fr)}
}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.section-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}

.input-icon-wrap{position:relative}
.input-icon-wrap input{padding-left:36px}
.input-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text3)}

.action-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}

.stat-spark{display:flex;gap:2px;align-items:flex-end;height:30px}
.spark-bar{background:var(--blue);border-radius:2px 2px 0 0;width:6px;opacity:.6;transition:opacity .2s}
.spark-bar:last-child{opacity:1}

.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px}

.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--text3)}
.riesgo-bar{width:100%;background:var(--bg3);border-radius:4px;height:4px;margin-top:4px}
.riesgo-fill{height:100%;border-radius:4px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius3);padding:24px;max-width:520px;width:90%;max-height:85vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:600;color:var(--text)}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-item{background:var(--bg3);border-radius:var(--radius);padding:12px}
.info-key{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);font-weight:600;margin-bottom:4px}
.info-val{font-size:14px;font-weight:500;color:var(--text)}

.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:16px;padding-bottom:16px;position:relative}
.tl-item::before{content:'';position:absolute;left:19px;top:32px;bottom:0;width:1px;background:var(--border)}
.tl-item:last-child::before{display:none}
.tl-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tl-content{flex:1;padding-top:6px}
.tl-title{font-size:13.5px;font-weight:600;color:var(--text)}
.tl-date{font-size:12px;color:var(--text3);margin-top:2px}
.tl-desc{font-size:13px;color:var(--text2);margin-top:4px;line-height:1.5}

#tour-field-typing{min-height:18px}
</style>
</head>
<body>

<div class="app">

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <div>
      <div style="font-size:14px;font-weight:700;line-height:1">SG-SST PHVA</div>
      <div style="font-size:10px;color:var(--text3);font-weight:400">Resolución 0312 · GTC-45</div>
    </div>
  </div>
  <div class="badge-empresa" id="badge-empresa">📍 Sin empresa configurada</div>
  <div class="topbar-right">
    <div style="font-size:12px;color:var(--text3)" id="badge-fecha"></div>
    <button class="btn-tour" onclick="iniciarTour()">▶ Tour Interactivo</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="nav-section">Principal</div>
  <div class="nav-item active" id="nav-dashboard" onclick="navTo('dashboard')">
    <span class="icon">📊</span> Dashboard
  </div>
  <div class="nav-item" id="nav-empresa" onclick="navTo('empresa')">
    <span class="icon">🏢</span> Empresa
  </div>
  <hr class="nav-sep">
  <div class="nav-section">Gestión</div>
  <div class="nav-item" id="nav-trabajadores" onclick="navTo('trabajadores')">
    <span class="icon">👥</span> Trabajadores
    <span class="badge-count" id="cnt-trab">0</span>
  </div>
  <div class="nav-item" id="nav-matriz" onclick="navTo('matriz')">
    <span class="icon">⚠️</span> Matriz GTC-45
    <span class="badge-count" id="cnt-mat">0</span>
  </div>
  <div class="nav-item" id="nav-capacitaciones" onclick="navTo('capacitaciones')">
    <span class="icon">📚</span> Capacitaciones
    <span class="badge-count" id="cnt-cap">0</span>
  </div>
  <div class="nav-item" id="nav-accidentes" onclick="navTo('accidentes')">
    <span class="icon">🚨</span> Accidentes/ATEP
    <span class="badge-count" id="cnt-acc">0</span>
  </div>
  <hr class="nav-sep">
  <div class="nav-section">Análisis</div>
  <div class="nav-item" id="nav-indicadores" onclick="navTo('indicadores')">
    <span class="icon">📈</span> Indicadores
  </div>
  <div class="nav-item" id="nav-reportes" onclick="navTo('reportes')">
    <span class="icon">📑</span> Reportes
  </div>

  <!-- SIDEBAR BUTTONS -->
  <div class="sidebar-btns" id="sidebar-btns">
    <button class="btn-prueba" onclick="cargarDatosPrueba()">🎮 Cargar datos de prueba</button>
    <button class="btn-limpiar" onclick="limpiarDatos()">🧹 Limpiar todo</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="main-content"></div>

</div>

<!-- TOUR OVERLAY -->
<div id="tour-backdrop" class="tour-backdrop" style="display:none" onclick="cerrarTour()"></div>
<div id="tour-popup" class="tour-popup" style="display:none">
  <div class="tour-step-num" id="tour-step-num"></div>
  <div class="tour-title" id="tour-title"></div>
  <div class="tour-desc" id="tour-desc">
    <span id="tour-field-typing"></span>
  </div>
  <div class="tour-actions">
    <div class="tour-dots" id="tour-dots"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="cerrarTour()">Saltar</button>
      <button class="btn btn-primary btn-sm" id="btn-tour-next" onclick="tourNext()">Siguiente →</button>
    </div>
  </div>
</div>
<div id="tour-highlight" class="tour-highlight" style="display:none"></div>
<div id="notif" class="notif" style="display:none">✅ <span id="notif-msg"></span></div>

<script>
// ===== ESTADO GLOBAL =====
const STATE = {
  empresa: null,
  trabajadores: [],
  peligros: [],
  capacitaciones: [],
  accidentes: [],
  currentPage: 'dashboard',
  tourStep: 0,
  tourActive: false,
};

// ===== DATOS DEMO =====
function cargarDatosPrueba() {
  STATE.empresa = {

function limpiarDatos() {
  STATE.empresa = null;
  STATE.trabajadores = [];
  STATE.peligros = [];
  STATE.capacitaciones = [];
  STATE.accidentes = [];
  actualizarContadores();
  navTo('dashboard');
  document.getElementById('badge-empresa').textContent = '📍 Sin empresa configurada';
  mostrarNotif('Sistema limpiado. Listo para nueva configuración.');
}

function actualizarContadores() {
  document.getElementById('cnt-trab').textContent = STATE.trabajadores.length;
  document.getElementById('cnt-mat').textContent = STATE.peligros.length;
  document.getElementById('cnt-cap').textContent = STATE.capacitaciones.length;
  document.getElementById('cnt-acc').textContent = STATE.accidentes.length;
}

function mostrarNotif(msg) {
  const el = document.getElementById('notif');
  document.getElementById('notif-msg').textContent = msg;
  el.style.display = 'flex';
  setTimeout(() => el.style.display = 'none', 3500);
}

// ===== NAVEGACIÓN =====
function navTo(page) {
  STATE.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  const mc = document.getElementById('main-content');
  const pages = {
    dashboard: renderDashboard,
    empresa: renderEmpresa,
    trabajadores: renderTrabajadores,
    matriz: renderMatriz,
    capacitaciones: renderCapacitaciones,
    accidentes: renderAccidentes,
    indicadores: renderIndicadores,
    reportes: renderReportes,
  };
  if (pages[page]) mc.innerHTML = pages[page]();
}

function calcNR() {
  const nd = parseFloat(document.getElementById('p_nd').value) || 0;
  const ne = parseFloat(document.getElementById('p_ne').value) || 0;
  const nc = parseFloat(document.getElementById('p_nc').value) || 0;
  const np = nd * ne;
  const nr = np * nc;
  document.getElementById('p_np').value = np;
  let nivel = nr > 600 ? 'I — No aceptable' : nr > 150 ? 'II — Con control' : nr > 40 ? 'III — Aceptable' : 'IV — Aceptable';
  document.getElementById('p_nr').value = nr + ' → ' + nivel;
}
function toggleFormPeligro() {
  const f = document.getElementById('form-peligro');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  if (f.style.display === 'block') calcNR();
}
function guardarPeligro() {
  const nd = parseInt(document.getElementById('p_nd').value);
  const ne = parseInt(document.getElementById('p_ne').value);
  const nc = parseInt(document.getElementById('p_nc').value);
  const np = nd * ne; const nr = np * nc;
  let nivel = nr > 600 ? 'I' : nr > 150 ? 'II' : nr > 40 ? 'III' : 'IV';
  const id = STATE.peligros.length + 1;
  STATE.peligros.push({
    id, proceso: document.getElementById('p_proc').value,
    area: document.getElementById('p_area').value,
    actividad: document.getElementById('p_act').value,
    tipo: document.getElementById('p_tipo').value,
    nd, ne, np, nc, nr, nivel, controls: ''
  });
  actualizarContadores();
  mostrarNotif('Peligro registrado — Nivel ' + nivel);
  navTo('matriz');
}
function eliminarPeligro(id) {
  STATE.peligros = STATE.peligros.filter(p => p.id !== id);
  actualizarContadores();
  mostrarNotif('Peligro eliminado');
  navTo('matriz');
}
function filtrarPeligros(q) {
  document.querySelectorAll('#tabla-peligros tbody tr').forEach(r => r.style.display = r.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none');
}

// ===== INDICADORES =====
function renderIndicadores() {
  const t = STATE.trabajadores.length || 1;
  const ats = STATE.accidentes.filter(x => x.tipo === 'Accidente de Trabajo');
  const dias = ats.reduce((s, a) => s + (a.dias_perdidos || 0), 0);
  const IF = t > 0 ? ((ats.length / t) * 240000).toFixed(0) : 0;
  const IS = t > 0 ? ((dias / t) * 240000).toFixed(0) : 0;
  const ILI = ats.length > 0 ? (dias / ats.length).toFixed(1) : '0.0';
  const caps = STATE.capacitaciones;
  const cr = caps.filter(x => x.estado === 'Realizada').length;
  const pctCap = caps.length > 0 ? Math.round(cr / caps.length * 100) : 0;
  const rNI = STATE.peligros.filter(x => x.nivel === 'I').length;
  const pctRiesgo = STATE.peligros.length > 0 ? Math.round((STATE.peligros.length - rNI) / STATE.peligros.length * 100) : 100;

  function gauge(val, max, color) {
    const pct = Math.min(val / max, 1);
    const r = 40, cx = 50, cy = 50;
    const circum = 2 * Math.PI * r;
    const dash = pct * circum * 0.75;
    return `<svg width="100" height="80" viewBox="0 0 100 80">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="8" stroke-dasharray="${circum * 0.75}" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(135 ${cx} ${cy})"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="8" stroke-dasharray="${dash} ${circum}" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(135 ${cx} ${cy})"/>
      <text x="${cx}" y="${cy + 6}" text-anchor="middle" fill="${color}" font-size="16" font-weight="600" font-family="IBM Plex Sans">${Math.round(pct * 100)}%</text>
    </svg>`;
  }

  return `
<div class="page-header">
  <div class="page-title">📈 Indicadores SST</div>
  <div class="page-sub">Medición del desempeño — Decreto 1072 Art. 2.2.4.6.20</div>
</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px">
  ${[
    ['Índice de Frecuencia', IF, 'AT × 240.000 / horas-hombre', 'var(--red)', IF > 5 ? 'Alto' : 'Aceptable'],
    ['Índice de Severidad', IS, 'Días perdidos × 240.000 / h-h', 'var(--amber)', IS > 20 ? 'Alto' : 'Aceptable'],
    ['Índice de Lesiones Incap.', ILI, 'IS / IF × 100', 'var(--blue)', 'Informativo'],
  ].map(([lbl, val, form, col, est]) => `
  <div class="card" style="text-align:center">
    <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">${lbl}</div>
    <div style="font-size:36px;font-weight:700;color:${col};margin:4px 0">${val}</div>
    <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">${form}</div>
    <div style="margin-top:10px"><span class="badge ${val==0?'green':col===('var(--red)')?'red':'amber'}">${est}</span></div>
  </div>`).join('')}
</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px">
  ${[
    ['Cumplimiento capacitaciones', pctCap, 100, 'var(--green)'],
    ['Peligros bajo control', pctRiesgo, 100, 'var(--teal)'],
    ['Trabajadores activos', t > 0 ? Math.round(STATE.trabajadores.filter(x=>x.estado==='Activo').length / t * 100) : 0, 100, 'var(--purple)'],
  ].map(([lbl, val, max, col]) => `
  <div class="card" style="text-align:center">
    ${gauge(val, max, col)}
    <div style="font-size:12px;font-weight:600;color:var(--text);margin-top:4px">${lbl}</div>
    <div style="font-size:13px;color:var(--text3);margin-top:2px">${val}% de meta</div>
  </div>`).join('')}
</div>
<div class="card">
  <div class="section-title">📋 Tabla resumen de indicadores de gestión</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Indicador</th><th>Fórmula</th><th>Valor actual</th><th>Meta</th><th>Cumplimiento</th></tr></thead>
      <tbody>
        ${[
          ['IF — Índice Frecuencia AT', '# AT × 240.000 / HHT', IF, '≤ 5', parseFloat(IF) <= 5],
          ['IS — Índice Severidad', 'Días perdidos × 240.000 / HHT', IS, '≤ 20', parseFloat(IS) <= 20],
          ['Cumplimiento formación', 'Capacit. realizadas / Programadas', pctCap + '%', '≥ 80%', pctCap >= 80],
          ['Peligros nivel I controlados', '(Total - Nivel I) / Total', pctRiesgo + '%', '100%', pctRiesgo === 100],
          ['Cobertura SST', 'Trab. con inducción / Total', t > 0 ? '100%' : '0%', '100%', t > 0],
        ].map(([ind, form, val, meta, ok]) => `
        <tr>
          <td>${ind}</td>
          <td style="font-family:var(--mono);font-size:11.5px;color:var(--text3)">${form}</td>
          <td style="font-weight:600;color:var(--text)">${val}</td>
          <td style="color:var(--text3)">${meta}</td>
          <td><span class="badge ${ok ? 'green' : 'red'}">${ok ? '✓ Cumple' : '✗ No cumple'}</span></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>
</div>`;
}

let typingTimer = null;

function iniciarTour() {
  if (STATE.trabajadores.length === 0) cargarDatosPrueba();
  STATE.tourStep = 0;
  STATE.tourActive = true;
  mostrarTourStep();
}

function mostrarTourStep() {
  const step = TOUR_STEPS[STATE.tourStep];
  const total = TOUR_STEPS.length;

  document.getElementById('tour-backdrop').style.display = 'block';
  const popup = document.getElementById('tour-popup');
  popup.style.display = 'block';

  document.getElementById('tour-step-num').textContent = `Paso ${STATE.tourStep + 1} de ${total}`;
  document.getElementById('tour-title').textContent = step.title;
  document.getElementById('tour-field-typing').textContent = '';

  const dots = document.getElementById('tour-dots');
  dots.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'tour-dot' + (i === STATE.tourStep ? ' active' : '');
    dots.appendChild(d);
  }

  const nextBtn = document.getElementById('btn-tour-next');
  nextBtn.textContent = STATE.tourStep < total - 1 ? 'Siguiente →' : '¡Finalizar!';

  if (step.page) navTo(step.page);

  posicionarPopup(step.target);

  if (step.target) {
    const el = document.getElementById(step.target);
    if (el) {
      const r = el.getBoundingClientRect();
      const hl = document.getElementById('tour-highlight');
      hl.style.display = 'block';
      hl.style.left = (r.left - 6) + 'px';
      hl.style.top = (r.top - 6) + 'px';
      hl.style.width = (r.width + 12) + 'px';
      hl.style.height = (r.height + 12) + 'px';
      el.scrollIntoView({behavior: 'smooth', block: 'nearest'});
    }
  } else {
    document.getElementById('tour-highlight').style.display = 'none';
  }

  setTimeout(() => typeText(step.autoType || step.desc, 'tour-field-typing'), 200);
}

function posicionarPopup(target) {
  const popup = document.getElementById('tour-popup');
  let left = window.innerWidth / 2 - 180;
  let top = window.innerHeight / 2 - 140;

  if (target) {
    const el = document.getElementById(target);
    if (el) {
      const r = el.getBoundingClientRect();
      left = Math.min(r.right + 20, window.innerWidth - 380);
      top = Math.max(r.top - 10, 70);
      if (left < 10) left = r.left;
      if (top + 300 > window.innerHeight) top = window.innerHeight - 320;
    }
  }
  popup.style.left = Math.max(10, left) + 'px';
  popup.style.top = Math.max(10, top) + 'px';
  popup.style.right = 'auto';
}

function typeText(text, elId) {
  if (typingTimer) clearInterval(typingTimer);
  const el = document.getElementById(elId);
  if (!el || !text) return;
  el.textContent = '';
  el.classList.add('typing-anim');
  let i = 0;
  typingTimer = setInterval(() => {
    if (i < text.length) {
      el.textContent += text[i++];
    } else {
      el.classList.remove('typing-anim');
      clearInterval(typingTimer);
    }
  }, 28);
}

function tourNext() {
  if (STATE.tourStep < TOUR_STEPS.length - 1) {
    STATE.tourStep++;
    mostrarTourStep();
  } else {
    cerrarTour();
    mostrarNotif('¡Tour completado! El sistema está listo para usar.');
  }
}

function cerrarTour() {
  STATE.tourActive = false;
  document.getElementById('tour-backdrop').style.display = 'none';
  document.getElementById('tour-popup').style.display = 'none';
  document.getElementById('tour-highlight').style.display = 'none';
  if (typingTimer) clearInterval(typingTimer);
}
